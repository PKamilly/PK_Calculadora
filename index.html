<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>PK_Calculadora</title>
</head>
<body>
    <h1 id="titulo">CALCULADORA</h1>

    <div id="calculadora">
        <input id="valorA" type="text" placeholder="Digite o valor de A">
        
        <select id="operador" name="operador">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="x">x</option>
            <option value="/">/</option>
        </select>

        <input id="valorB" type="text" placeholder="Digite o valor de B"><br>
        
        <button id="botaoCalcular" type="button">Calcular</button>

        <h2 id="resultado">RESULTADO: </h2>
    </div>

    <h3 id="creditos">Página criada por Kamilly Mattana</h3>
    <h3 id="creditos"></h3>
    <a id="link" href="https://github.com/PKamilly/PK_Calculadora">Clique aqui para o GitHub da página</a>
<script src="./script.js"></script>
</body>
</html>
